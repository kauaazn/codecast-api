# Nome da aplicação
spring.application.name=codecast

# Porta do servidor
server.port=8080

# Configuração do banco H2 (banco em memória)
spring.datasource.url=jdbc:h2:mem:codecastdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilita o console visual do H2 (para ver o banco pelo navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Faz o Spring criar as tabelas automaticamente com base nas entidades
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true